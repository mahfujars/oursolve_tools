<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Free Online Tools — Oursolve</title>
  <meta name="description" content="Browse all free online tools at Oursolve — developer tools, security tools, writing tools, and more. Everything runs in your browser.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #e0e7ff;
      --bg: #f8fafc; --surface: #fff; --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --shadow: 0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 12px rgba(99,102,241,.2),0 8px 32px rgba(0,0,0,.1);
      --radius: 16px;
    }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

    /* Nav */
    nav { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
    .brand { font-weight: 800; font-size: 1.1rem; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .brand .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg,#a78bfa,#6366f1); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: .9rem; }
    .nav-links { display: flex; gap: 20px; margin-left: auto; }
    .nav-links a { font-size: .875rem; font-weight: 600; color: var(--text-muted); text-decoration: none; transition: color .15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }

    /* Hero */
    header { background: linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4338ca 100%); color: #fff; padding: 48px 24px 64px; text-align: center; position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 60% 0%,rgba(139,92,246,.3) 0%,transparent 60%),radial-gradient(ellipse at 20% 100%,rgba(99,102,241,.2) 0%,transparent 50%); pointer-events: none; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 5px 16px; font-size: .82rem; font-weight: 600; margin-bottom: 20px; position: relative; }
    header h1 { font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; position: relative; }
    header p { font-size: 1.05rem; color: rgba(255,255,255,.75); position: relative; }

    /* Main */
    main { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; transform: translateY(-40px); }

    /* Toolbar */
    .toolbar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 28px; box-shadow: var(--shadow); }
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .search-input { width: 100%; padding: 12px 14px 12px 42px; font-size: .95rem; font-family: inherit; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { font-size: .82rem; font-weight: 600; padding: 6px 14px; border: 1px solid var(--border); border-radius: 50px; background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all .15s; font-family: inherit; }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chip .count { opacity: .7; margin-left: 4px; font-weight: 500; }

    /* Tools grid */
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 20px; }
    .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 14px; box-shadow: var(--shadow); transition: transform .2s,box-shadow .2s,border-color .2s; }
    .tool-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--primary); }
    .tool-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .tool-card h2 { font-size: 1.15rem; font-weight: 700; }
    .tool-card p { font-size: .9rem; color: var(--text-muted); line-height: 1.55; flex: 1; }
    .tool-link { display: inline-flex; align-items: center; gap: 6px; font-size: .85rem; font-weight: 600; color: var(--primary); }
    .tool-link svg { transition: transform .2s; }
    .tool-card:hover .tool-link svg { transform: translateX(4px); }
    .tag { display: inline-block; font-size: .72rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--primary-light); color: var(--primary-dark); }

    /* Category sections */
    .category-section { margin-bottom: 40px; }
    .category-section:last-child { margin-bottom: 0; }
    .category-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .category-heading h3 { font-size: 1.05rem; font-weight: 700; }
    .count-badge { font-size: .75rem; font-weight: 600; color: var(--text-muted); background: var(--border); padding: 2px 10px; border-radius: 50px; }
    .section-label { font-size: .8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }
    .empty-state strong { color: var(--text); display: block; margin-bottom: 4px; }

    /* Icon colors */
    .icon-qr { background: #ede9fe; } .icon-pass { background: #fce7f3; } .icon-word { background: #d1fae5; }
    .icon-json { background: #fff7ed; } .icon-b64 { background: #eff6ff; } .icon-url { background: #f0fdf4; }
    .icon-hash { background: #fdf2f8; } .icon-md { background: #f5f3ff; } .icon-rx { background: #ecfeff; }
    .icon-islamic { background: #fef9c3; } .icon-soon { background: #f1f5f9; }

    /* Footer */
    footer { text-align: center; padding: 32px 24px; color: var(--text-muted); font-size: .875rem; border-top: 1px solid var(--border); }
    footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 600px) {
      .tools-grid { grid-template-columns: 1fr; }
      header { padding: 40px 16px 56px; }
      main { padding: 0 16px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="brand">
    <div class="logo-icon">🛠</div>
    Oursolve
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/tools/" class="active">Tools</a>
    <a href="/blog/">Blog</a>
  </div>
</nav>

<header>
  <div class="hero-badge">🛠 All Tools</div>
  <h1>Free Online Tools</h1>
  <p>Every tool runs in your browser — no sign-up, no tracking, no data sent anywhere.</p>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="searchInput" class="search-input" type="search" placeholder="Search tools..." autocomplete="off">
    </div>
    <div id="filterChips" class="filter-chips"></div>
  </div>
  <div id="toolsContainer"></div>
</main>

<footer>
  <p>Built with ♥ by <a href="/">Oursolve</a> · <a href="/blog/">Blog</a> · All tools are free and run 100% in your browser.</p>
</footer>

<script>
const CATEGORY_ORDER = ['Developer','Security','Generator','Encoding','Writing','Islamic'];
const ARROW = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
let TOOLS = [], activeFilter = 'All', searchTerm = '';

fetch('/tools/tools.json')
  .then(r => r.json())
  .then(data => { TOOLS = data; renderChips(); renderTools(); })
  .catch(() => {
    document.getElementById('toolsContainer').innerHTML =
      '<div class="empty-state"><strong>Could not load tools.</strong> Please refresh.</div>';
  });

function cardHTML(t) {
  return `<a class="tool-card" href="/tools/${t.slug}/">
    <div class="tool-icon ${t.iconClass}">${t.icon}</div>
    <div><span class="tag">${t.category}</span><h2>${t.name}</h2></div>
    <p>${t.desc}</p>
    <span class="tool-link">Open tool ${ARROW}</span>
  </a>`;
}

function renderChips() {
  const counts = TOOLS.reduce((a,t) => (a[t.category]=(a[t.category]||0)+1,a), {});
  const cats = ['All', ...CATEGORY_ORDER.filter(c => counts[c])];
  document.getElementById('filterChips').innerHTML = cats.map(c => {
    const n = c==='All' ? TOOLS.length : counts[c];
    return `<button class="chip${c===activeFilter?' active':''}" data-cat="${c}">${c}<span class="count">${n}</span></button>`;
  }).join('');
  document.querySelectorAll('.chip').forEach(b =>
    b.addEventListener('click', () => { activeFilter = b.dataset.cat; renderChips(); renderTools(); })
  );
}

function renderTools() {
  const q = searchTerm.trim().toLowerCase();
  const filtered = TOOLS.filter(t => {
    if (activeFilter !== 'All' && t.category !== activeFilter) return false;
    if (q && !(t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.category.toLowerCase().includes(q))) return false;
    return true;
  });
  const container = document.getElementById('toolsContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><strong>No tools match.</strong> Try a different keyword.</div>';
    return;
  }
  if (q || activeFilter !== 'All') {
    container.innerHTML = `<div class="tools-grid">${filtered.map(cardHTML).join('')}</div>`;
    return;
  }
  const groups = {};
  filtered.forEach(t => (groups[t.category]=groups[t.category]||[]).push(t));
  container.innerHTML = CATEGORY_ORDER.filter(c => groups[c]).map(c => `
    <section class="category-section">
      <div class="category-heading"><h3>${c}</h3><span class="count-badge">${groups[c].length}</span></div>
      <div class="tools-grid">${groups[c].map(cardHTML).join('')}</div>
    </section>`).join('');
}

document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; renderTools(); });
</script>

</body>
</html>
