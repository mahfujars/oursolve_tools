let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = NAMES.filter(n => {
    if (activeFilter !== 'all' && n.g !== activeFilter) return false;
    if (!q) return true;
    return n.n.toLowerCase().includes(q) || n.m.toLowerCase().includes(q) || n.o.toLowerCase().includes(q);
  });

  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');

  if (!filtered.length) {
    grid.innerHTML = '';
    noRes.style.display = '';
    document.getElementById('stats').innerHTML = '';
    return;
  }

  noRes.style.display = 'none';
  const boys = filtered.filter(n => n.g === 'boy').length;
  const girls = filtered.filter(n => n.g === 'girl').length;
  document.getElementById('stats').innerHTML =
    `Showing <span>${filtered.length}</span> names` +
    (boys && girls ? ` — <span>${boys}</span> boys, <span>${girls}</span> girls` :
     boys ? ` — boys` : ` — girls`);

  grid.innerHTML = filtered.map(n => `
    <div class="card ${n.g}">
      <div class="card-top">
        <div>
          <div class="name-en">${n.n}</div>
          <div class="name-ar">${n.ar}</div>
        </div>
        <span class="gender-badge">${n.g === 'boy' ? '♂ Boy' : '♀ Girl'}</span>
      </div>
      <div class="meaning">${n.m}</div>
      <div class="origin">Origin: ${n.o}</div>
      <button class="copy-btn" onclick="copyName('${n.n}',this)">Copy</button>
    </div>
  `).join('');
}

async function clip(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch {}
  try {
    const ta = Object.assign(document.createElement('textarea'), {value: text});
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta); return ok;
  } catch { return false; }
}

async function copyName(name, btn) {
  const ok = await clip(name);
  if (ok) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); }
}

render();
