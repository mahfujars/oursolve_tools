  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Muslim Baby Names Finder","url":"https://oursolve.com/tools/muslim-names/","description":"Browse Muslim baby names with meanings and origins.","applicationCategory":"LifestyleApplication","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#e0e7ff;--bg:#f8fafc;--surface:#fff;--text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--radius:16px;--boy:#3b82f6;--boy-light:#eff6ff;--girl:#ec4899;--girl-light:#fdf2f8}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    nav{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
    nav a{text-decoration:none;color:var(--text-muted);font-size:.875rem;display:flex;align-items:center;gap:6px;transition:color .15s}
    nav a:hover{color:var(--primary)}
    .nav-sep{color:var(--border)}
    .nav-current{color:var(--text);font-weight:600;font-size:.875rem}
    .hero{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4338ca 100%);color:#fff;padding:48px 24px 56px;text-align:center}
    .tool-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:.8rem;font-weight:600;margin-bottom:16px}
    .hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.5px;margin-bottom:12px}
    .hero p{color:rgba(255,255,255,.75);font-size:1.05rem;max-width:520px;margin:0 auto}
    main{max-width:1100px;margin:0 auto;padding:0 24px 80px;transform:translateY(-32px)}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:20px}
    .controls-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
    input[type=search]{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;font-size:.9rem;font-family:inherit;background:#f8fafc;outline:none;transition:border-color .15s}
    input[type=search]:focus{border-color:var(--primary)}
    .filter-group{display:flex;gap:6px;flex-wrap:wrap}
    .filter-btn{padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:var(--text-muted);transition:all .15s}
    .filter-btn:hover{border-color:var(--primary);color:var(--primary)}
    .filter-btn.all.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .filter-btn.boy.active{background:var(--boy);border-color:var(--boy);color:#fff}
    .filter-btn.girl.active{background:var(--girl);border-color:var(--girl);color:#fff}
    .stats{font-size:.82rem;color:var(--text-muted);margin-top:12px}
    .stats span{font-weight:700;color:var(--text)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px 32px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;cursor:default;position:relative;overflow:hidden}
    .card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.09)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .card.boy::before{background:var(--boy)}
    .card.girl::before{background:var(--girl)}
    .card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px}
    .name-en{font-size:1rem;font-weight:800;color:var(--text)}
    .gender-badge{padding:2px 7px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;flex-shrink:0}
    .boy .gender-badge{background:var(--boy-light);color:var(--boy)}
    .girl .gender-badge{background:var(--girl-light);color:var(--girl)}
    .meaning{font-size:.8rem;color:var(--text);margin-bottom:4px;line-height:1.4}
    .origin{font-size:.72rem;color:var(--text-muted);font-weight:600}
    .copy-btn{position:absolute;bottom:8px;right:8px;background:none;border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:.68rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s}
    .copy-btn:hover{border-color:var(--primary);color:var(--primary)}
    .no-results{text-align:center;padding:60px 24px;color:var(--text-muted)}
    .loading{text-align:center;padding:60px 24px;color:var(--text-muted)}
    footer{text-align:center;padding:32px 24px;color:var(--text-muted);font-size:.875rem;border-top:1px solid var(--border)}
    footer a{color:var(--primary);text-decoration:none}
    @media(max-width:500px){.controls-row{flex-direction:column;align-items:stretch}.filter-group{justify-content:center}}
  </style>
</head>
<body>

<nav>
  <a href="../../">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Oursolve
  </a>
  <span class="nav-sep">/</span>
  <span class="nav-current">Muslim Names</span>
</nav>

<div class="hero">
  <div class="tool-badge">☪️ Islamic</div>
  <h1>Muslim Baby Names</h1>
  <p>200+ beautiful Islamic names for boys and girls with meanings and origins.</p>
</div>

<main>
  <div class="controls">
    <div class="controls-row">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search name or meaning…" oninput="render()">
      </div>
      <div class="filter-group">
        <button class="filter-btn all active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn boy" onclick="setFilter('boy',this)">Boys</button>
        <button class="filter-btn girl" onclick="setFilter('girl',this)">Girls</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="output"><div class="loading">Loading names…</div></div>
</main>

<footer>
  <p><a href="../../">← Back to all tools</a> · Oursolve — Free online tools</p>
</footer>

<script>
let NAMES = [];
let activeFilter = 'all';

fetch('names.json')
  .then(r => r.json())
  .then(data => { NAMES = data; render(); })
  .catch(() => {
    document.getElementById('output').innerHTML = '<div class="no-results"><p>Failed to load names. Please refresh.</p></div>';
  });

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();

  const filtered = NAMES.filter(n => {
    if (activeFilter === 'boy' && n.g !== 'boy') return false;
    if (activeFilter === 'girl' && n.g !== 'girl') return false;
    if (!q) return true;
    return n.n.toLowerCase().includes(q) || n.m.toLowerCase().includes(q) || n.o.toLowerCase().includes(q);
  });

  const out = document.getElementById('output');

  if (!filtered.length) {
    out.innerHTML = '<div class="no-results"><p>No names match your search.</p></div>';
    document.getElementById('stats').innerHTML = '';
    return;
  }

  const boys = filtered.filter(n => n.g === 'boy').length;
  const girls = filtered.filter(n => n.g === 'girl').length;
  document.getElementById('stats').innerHTML =
    `Showing <span>${filtered.length}</span> names` +
    (boys && girls ? ` — <span>${boys}</span> boys, <span>${girls}</span> girls` :
     boys ? ` — boys` : ` — girls`);

  out.innerHTML = `<div class="grid">${filtered.map(cardHtml).join('')}</div>`;
}

function cardHtml(n) {
  return `
    <div class="card ${n.g}">
      <div class="card-top">
        <div class="name-en">${n.n}</div>
        <span class="gender-badge">${n.g === 'boy' ? '♂ Boy' : '♀ Girl'}</span>
      </div>
      <div class="meaning">${n.m}</div>
      <div class="origin">${n.o}</div>
      <button class="copy-btn" onclick="copyName('${n.n.replace(/'/g,"\\'")}',this)">Copy</button>
    </div>`;
}

async function clip(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch {}
  try {
    const ta = Object.assign(document.createElement('textarea'), {value: text});
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta); return ok;
  } catch { return false; }
}

async function copyName(name, btn) {
  const ok = await clip(name);
  if (ok) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); }
}
</script>
</body>
</html>
