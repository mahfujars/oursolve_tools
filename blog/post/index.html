<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… — Oursolve Blog</title>
  <meta name="robots" content="index, follow">
  <!-- highlight.js for code blocks from CKEditor -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    integrity="sha512-0aPQyyeZrWj9sCA46UlmWgKOP0mUipLQ6OZXu8l4IcAmD2u31EPEy9VcIMvl7SoAaKe8bLXZhYoMaE/in+gcQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Breadcrumb */
    .breadcrumb {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255,255,255,.65);
      z-index: 10;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
    }
    .breadcrumb a { color: rgba(255,255,255,.85); text-decoration: none; flex-shrink: 0; }
    .breadcrumb a:hover { color: #fff; }
    .breadcrumb svg { opacity: .5; flex-shrink: 0; }
    .breadcrumb .bc-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Hero */
    header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      color: #fff;
      padding: 72px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(139,92,246,.3) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, rgba(99,102,241,.2) 0%, transparent 50%);
      pointer-events: none;
    }
    .post-meta-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.85rem;
      color: rgba(255,255,255,.65);
      margin-bottom: 18px;
    }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .dot { opacity: .4; }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1.25;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    /* Main */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px 80px;
      transform: translateY(-40px);
    }

    /* Featured image */
    .featured-img {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
    }
    .featured-img img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
    }

    /* Article content card */
    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 44px;
      box-shadow: var(--shadow);
    }

    /* Prose styles */
    .prose { font-size: 1rem; line-height: 1.8; color: var(--text); }
    .prose h1, .prose h2, .prose h3, .prose h4 {
      font-weight: 700; line-height: 1.3; margin: 1.8em 0 .6em; color: var(--text);
    }
    .prose h2 { font-size: 1.5rem; }
    .prose h3 { font-size: 1.25rem; }
    .prose h4 { font-size: 1.05rem; }
    .prose p { margin-bottom: 1.2em; }
    .prose a { color: var(--primary); text-decoration: underline; }
    .prose a:hover { color: var(--primary-dark); }
    .prose ul, .prose ol { margin: 1em 0 1.2em 1.5em; }
    .prose li { margin-bottom: .4em; }
    .prose blockquote {
      border-left: 4px solid var(--primary);
      padding: .8em 1.2em;
      margin: 1.5em 0;
      background: var(--primary-light);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .prose img { max-width: 100%; border-radius: 10px; margin: 1em 0; display: block; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: .9rem; }
    .prose th { background: var(--bg); font-weight: 700; }
    .prose th, .prose td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
    .prose pre {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      overflow-x: auto;
      margin: 1.5em 0;
      font-size: .88rem;
    }
    .prose code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: .88em;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .prose pre code { background: none; padding: 0; font-size: inherit; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      margin-top: 32px;
      padding: 10px 20px;
      border: 1px solid var(--primary-light);
      border-radius: 50px;
      background: var(--primary-light);
      transition: all .15s;
    }
    .back-link:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Loading / error */
    .state-box {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 16px; }
    .state-box h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 600px) {
      .article-card { padding: 24px 20px; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header id="postHeader">
  <nav class="breadcrumb" id="breadcrumb">
    <a href="/">Oursolve</a>
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    <a href="/blog/">Blog</a>
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    <span class="bc-title" id="bcTitle">Loading…</span>
  </nav>
  <div class="post-meta-header" id="postMeta"></div>
  <h1 id="postTitle">Loading…</h1>
</header>

<main>
  <div id="content"></div>
  <a href="/blog/" class="back-link">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    Back to Blog
  </a>
</main>

<footer>
  <p>Built with ♥ by <a href="/">Oursolve</a> · <a href="/blog/">Blog</a> · All tools are free and run 100% in your browser.</p>
</footer>

<script
  src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
  integrity="sha512-D9gUyxqja7hBtkWpPWGt9wfbfaMGVt9gnyCvYa+jojwwPHLCzUm5i8rpk7vD7wNee9bA35eYIjobYPaQuKS1MQ=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
  const API = '/wp-json/wp/v2';

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const pathSlug = window.location.pathname.replace(/\/$/, '').split('/').pop();
    const slug = params.get('slug') || (pathSlug && pathSlug !== 'post' ? pathSlug : null);
    if (!slug) { window.location.href = '/blog/'; return; }

    const content = document.getElementById('content');

    try {
      const res = await fetch(`${API}/posts?slug=${encodeURIComponent(slug)}&_embed=1`);
      if (!res.ok) throw new Error('api-error');
      const posts = await res.json();
      if (!posts.length) throw new Error('not-found');
      const post = posts[0];

      document.title = `${post.title.rendered} — Oursolve Blog`;

      document.getElementById('bcTitle').textContent = post.title.rendered;
      document.getElementById('postTitle').innerHTML = post.title.rendered;

      const cats = post._embedded?.['wp:term']?.[0] || [];
      const badge = cats.length ? `<span class="badge">${cats[0].name}</span><span class="dot">·</span>` : '';
      const author = post._embedded?.author?.[0];
      const authorName = author?.name || 'Oursolve';

      document.getElementById('postMeta').innerHTML = `
        ${badge}
        <span>${authorName}</span>
        <span class="dot">·</span>
        <span>${fmtDate(post.date)}</span>
      `;

      const media = post._embedded?.['wp:featuredmedia']?.[0];
      const imgHtml = media?.source_url
        ? `<div class="featured-img"><img src="${media.source_url}" alt="${post.title.rendered}"></div>` : '';

      const tagTerms = post._embedded?.['wp:term']?.[1] || [];
      const tagsHtml = tagTerms.length
        ? `<div class="tags">${tagTerms.map(t => `<span class="tag">${t.name}</span>`).join('')}</div>` : '';

      content.innerHTML = `
        ${imgHtml}
        <div class="article-card">
          <div class="prose">${post.content.rendered}</div>
          ${tagsHtml}
        </div>
      `;

      document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

    } catch (err) {
      const msg = err.message === 'not-found'
        ? { icon: '🔍', title: 'Post not found', desc: "This article doesn't exist or has been removed." }
        : { icon: '⚠️', title: "Couldn't load post", desc: 'Please try refreshing the page.' };

      document.getElementById('postTitle').textContent = msg.title;
      document.getElementById('bcTitle').textContent = msg.title;
      content.innerHTML = `
        <div class="state-box">
          <div class="icon">${msg.icon}</div>
          <h3>${msg.title}</h3>
          <p>${msg.desc}</p>
        </div>
      `;
    }
  }

  loadPost();
</script>

</body>
</html>
