<body>
<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📄 PDF Tools</div>
  <h1>JPG to PDF</h1>
  <p>Combine JPG, PNG, or WebP images into a single PDF — drag to reorder pages.</p>
</div>
<main>
  <div class="card">
    <p class="card-title">Add Images</p>
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <p><strong>Drop images here</strong> or click to browse</p>
      <p style="font-size:.85rem;margin-top:6px;">JPG, PNG, WebP — multiple allowed</p>
    </div>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple>
    <div class="image-list" id="image-list"></div>
    <label style="margin-top:20px;">Page Size</label>
    <select id="page-size">
      <option value="a4">A4 (210 × 297 mm)</option>
      <option value="letter">Letter (8.5 × 11 in)</option>
      <option value="fit">Fit to Image</option>
    </select>
    <button class="btn-primary" id="create-btn" onclick="createPDF()" disabled>Create PDF</button>
    <div class="status" id="status"></div>
    <a class="download-btn" id="download-btn" style="display:none;" download="images.pdf">⬇ Download PDF</a>
  </div>
</main>
<div id="tool-footer"></div>
<script>
  const images = [];
  let dragSrc = null;

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); addFiles([...e.dataTransfer.files]); });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(files) {
    files.filter(f => f.type.startsWith('image/')).forEach(f => {
      const url = URL.createObjectURL(f);
      images.push({ file: f, url });
    });
    renderList();
  }

  function renderList() {
    const list = document.getElementById('image-list');
    list.innerHTML = '';
    images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'image-item';
      item.draggable = true;
      item.dataset.index = i;
      item.innerHTML = `<img src="${img.url}" alt="${img.file.name}"><p class="image-label">${img.file.name}</p><button class="image-remove" onclick="removeImage(${i})">×</button>`;
      item.addEventListener('dragstart', () => { dragSrc = i; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', e => e.preventDefault());
      item.addEventListener('drop', e => { e.preventDefault(); if (dragSrc !== null && dragSrc !== i) { const m = images.splice(dragSrc, 1)[0]; images.splice(i, 0, m); renderList(); } dragSrc = null; });
      list.appendChild(item);
    });
    document.getElementById('create-btn').disabled = images.length === 0;
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('status').textContent = images.length ? `${images.length} image${images.length > 1 ? 's' : ''} added` : '';
  }

  function removeImage(i) { URL.revokeObjectURL(images[i].url); images.splice(i, 1); renderList(); }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  async function createPDF() {
    if (!images.length) return;
    const btn = document.getElementById('create-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'Building PDF…';
    document.getElementById('download-btn').style.display = 'none';

    try {
      const { PDFDocument, PageSizes } = PDFLib;
      const pdf = await PDFDocument.create();
      const pageSize = document.getElementById('page-size').value;
      const A4 = [595.28, 841.89];
      const LETTER = [612, 792];

      for (let i = 0; i < images.length; i++) {
        status.textContent = `Embedding image ${i + 1} of ${images.length}…`;
        const imgObj = images[i];
        const buf = await imgObj.file.arrayBuffer();
        let embedded;
        if (imgObj.file.type === 'image/png') {
          embedded = await pdf.embedPng(buf);
        } else {
          const canvas = document.createElement('canvas');
          const img = await loadImage(imgObj.url);
          canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          const jpegBuf = await new Promise(res => canvas.toBlob(b => b.arrayBuffer().then(res), 'image/jpeg', 0.92));
          embedded = await pdf.embedJpg(jpegBuf);
        }

        const iw = embedded.width, ih = embedded.height;
        let pw, ph;
        if (pageSize === 'fit') { pw = iw; ph = ih; }
        else if (pageSize === 'letter') { [pw, ph] = iw > ih ? [LETTER[1], LETTER[0]] : LETTER; }
        else { [pw, ph] = iw > ih ? [A4[1], A4[0]] : A4; }

        const scale = Math.min(pw / iw, ph / ih);
        const dw = iw * scale, dh = ih * scale;
        const x = (pw - dw) / 2, y = (ph - dh) / 2;
        const page = pdf.addPage([pw, ph]);
        page.drawImage(embedded, { x, y, width: dw, height: dh });
      }

      const bytes = await pdf.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const dlBtn = document.getElementById('download-btn');
      dlBtn.href = URL.createObjectURL(blob);
      dlBtn.style.display = 'block';
      status.textContent = `Done! ${images.length}-page PDF ready. (${(bytes.length/1024).toFixed(0)} KB)`;
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    }
    btn.disabled = false;
  }
</script>
<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
