  <link rel="stylesheet" href="/tool/shared.css">
  <style>
    main { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; transform: translateY(-32px); }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 48px 24px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--primary); background: var(--primary-light); }
    .drop-zone svg { margin: 0 auto 12px; display: block; opacity: .4; }
    .drop-zone p { color: var(--text-muted); margin: 0; }
    .drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    .file-info {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
    }
    .file-info .file-name { flex: 1; font-weight: 600; font-size: .9rem; }
    .file-info .page-count { font-size: .85rem; color: var(--text-muted); }
    .remove-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
    .remove-btn:hover { color: #ef4444; }
    label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 8px; }
    .range-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
    input[type="range"] { flex: 1; accent-color: var(--primary); }
    .range-value { font-size: .875rem; font-weight: 600; color: var(--primary); min-width: 32px; text-align: right; }
    .btn-primary {
      display: block; width: 100%; padding: 14px; margin-top: 20px;
      background: #1C4D8D; color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background .15s, transform .15s;
    }
    .btn-primary:hover { background: #093C5D; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .status { margin-top: 16px; text-align: center; font-size: .95rem; color: var(--text-muted); }
    .download-btn {
      display: block; width: 100%; padding: 14px; margin-top: 12px;
      background: #16a34a; color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
      text-align: center; text-decoration: none;
    }
    .download-btn:hover { background: #15803d; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 20px; }
    .preview-item { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; text-align: center; background: var(--surface); }
    .preview-item img { width: 100%; display: block; }
    .preview-label { font-size: .8rem; color: var(--text-muted); padding: 8px; }
    .preview-dl { font-size: .8rem; color: var(--primary); text-decoration: none; padding: 0 8px 8px; display: block; font-weight: 600; }
    .preview-dl:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📄 PDF Tools</div>
  <h1>PDF to JPG</h1>
  <p>Render every page of your PDF as a downloadable JPEG image — fast and browser-only.</p>
</div>
<main>
  <div class="card">
    <p class="card-title">Upload PDF</p>
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4 4 4"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
      <p><strong>Drop PDF here</strong> or click to browse</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    <div id="file-info-area"></div>
    <div id="options" style="display:none;">
      <label style="margin-top:16px;">JPEG Quality</label>
      <div class="range-row">
        <input type="range" id="quality-slider" min="60" max="100" step="5" value="85">
        <span class="range-value" id="quality-label">85%</span>
      </div>
      <button class="btn-primary" id="convert-btn" onclick="convertAll()">Convert All Pages</button>
    </div>
    <div class="status" id="status"></div>
    <a class="download-btn" id="download-zip-btn" style="display:none;">⬇ Download All as ZIP</a>
  </div>
  <div id="preview-grid" class="preview-grid"></div>
</main>
<div id="tool-footer"></div>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfFile = null;
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const qualitySlider = document.getElementById('quality-slider');
  const qualityLabel = document.getElementById('quality-label');

  qualitySlider.addEventListener('input', () => { qualityLabel.textContent = qualitySlider.value + '%'; });
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); fileInput.value = ''; });

  async function loadFile(file) {
    if (!file.name.endsWith('.pdf') && file.type !== 'application/pdf') return;
    pdfFile = file;
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    document.getElementById('file-info-area').innerHTML = `<div class="file-info"><span class="file-name">${file.name}</span><span class="page-count">${pdf.numPages} pages &middot; ${(file.size/1024).toFixed(0)} KB</span><button class="remove-btn" onclick="clearFile()">×</button></div>`;
    document.getElementById('options').style.display = 'block';
    document.getElementById('download-zip-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
    document.getElementById('preview-grid').innerHTML = '';
  }

  function clearFile() {
    pdfFile = null;
    document.getElementById('file-info-area').innerHTML = '';
    document.getElementById('options').style.display = 'none';
    document.getElementById('download-zip-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
    document.getElementById('preview-grid').innerHTML = '';
  }

  async function convertAll() {
    if (!pdfFile) return;
    const btn = document.getElementById('convert-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    document.getElementById('download-zip-btn').style.display = 'none';
    document.getElementById('preview-grid').innerHTML = '';

    const quality = parseInt(qualitySlider.value) / 100;
    const buf = await pdfFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const total = pdf.numPages;
    const blobs = [];

    for (let i = 1; i <= total; i++) {
      status.textContent = `Rendering page ${i} of ${total}…`;
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      blobs.push(blob);

      const grid = document.getElementById('preview-grid');
      const item = document.createElement('div');
      item.className = 'preview-item';
      const url = URL.createObjectURL(blob);
      item.innerHTML = `<img src="${url}" alt="Page ${i}"><p class="preview-label">Page ${i}</p><a class="preview-dl" href="${url}" download="page-${String(i).padStart(3,'0')}.jpg">⬇ Download</a>`;
      grid.appendChild(item);
    }

    if (total > 1) {
      status.textContent = 'Zipping…';
      const zip = new JSZip();
      blobs.forEach((b, idx) => zip.file(`page-${String(idx+1).padStart(3,'0')}.jpg`, b));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const dlBtn = document.getElementById('download-zip-btn');
      dlBtn.href = URL.createObjectURL(zipBlob);
      dlBtn.download = 'pdf-pages.zip';
      dlBtn.style.display = 'block';
    }
    status.textContent = `Done! ${total} image${total > 1 ? 's' : ''} rendered.`;
    btn.disabled = false;
  }
</script>
<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
