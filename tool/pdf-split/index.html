  <style>

<body>
<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📄 PDF Tools</div>
  <h1>PDF Split</h1>
  <p>Extract all pages individually or pull out a custom page range from any PDF.</p>
</div>
<main>
  <div class="card">
    <p class="card-title">Upload PDF</p>
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4 4 4"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
      <p><strong>Drop PDF here</strong> or click to browse</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    <div id="file-info-area"></div>

    <div id="split-options" style="display:none;">
      <div class="mode-tabs">
        <button class="tab-btn active" id="tab-all" onclick="setMode('all')">Extract All Pages</button>
        <button class="tab-btn" id="tab-range" onclick="setMode('range')">Custom Page Range</button>
      </div>
      <div class="range-section" id="range-section" style="display:none;">
        <label for="range-input">Page Range</label>
        <input type="text" id="range-input" placeholder="e.g. 1-3, 5, 7-9">
        <p class="hint">Separate ranges with commas. Pages are 1-indexed.</p>
      </div>
      <button class="btn-primary" id="split-btn" onclick="splitPDF()">Split PDF</button>
    </div>
    <div class="status" id="status"></div>
    <a class="download-btn" id="download-btn" style="display:none;" download="split.pdf">⬇ Download PDF</a>
    <a class="download-btn" id="download-zip-btn" style="display:none;">⬇ Download All Pages (ZIP)</a>
  </div>
</main>
<div id="tool-footer"></div>
<script>
  let pdfFile = null;
  let pageCount = 0;
  let mode = 'all';

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); fileInput.value = ''; });

  async function loadFile(file) {
    if (!file.name.endsWith('.pdf') && file.type !== 'application/pdf') return;
    pdfFile = file;
    const buf = await file.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(buf);
    pageCount = doc.getPageCount();
    document.getElementById('file-info-area').innerHTML = `<div class="file-info"><span class="file-name">${file.name}</span><span class="page-count">${pageCount} pages &middot; ${(file.size/1024).toFixed(0)} KB</span><button class="remove-btn" onclick="clearFile()">×</button></div>`;
    document.getElementById('split-options').style.display = 'block';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('download-zip-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
  }

  function clearFile() {
    pdfFile = null; pageCount = 0;
    document.getElementById('file-info-area').innerHTML = '';
    document.getElementById('split-options').style.display = 'none';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('download-zip-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
  }

  function setMode(m) {
    mode = m;
    document.getElementById('tab-all').classList.toggle('active', m === 'all');
    document.getElementById('tab-range').classList.toggle('active', m === 'range');
    document.getElementById('range-section').style.display = m === 'range' ? 'block' : 'none';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('download-zip-btn').style.display = 'none';
  }

  function parseRanges(str, total) {
    const indices = new Set();
    str.split(',').forEach(part => {
      part = part.trim();
      const match = part.match(/^(\d+)-(\d+)$/);
      if (match) {
        const a = parseInt(match[1]), b = parseInt(match[2]);
        for (let i = a; i <= b; i++) if (i >= 1 && i <= total) indices.add(i - 1);
      } else {
        const n = parseInt(part);
        if (!isNaN(n) && n >= 1 && n <= total) indices.add(n - 1);
      }
    });
    return [...indices].sort((a, b) => a - b);
  }

  async function splitPDF() {
    if (!pdfFile) return;
    const btn = document.getElementById('split-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'Processing…';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('download-zip-btn').style.display = 'none';

    try {
      const { PDFDocument } = PDFLib;
      const buf = await pdfFile.arrayBuffer();
      const src = await PDFDocument.load(buf);

      if (mode === 'range') {
        const rangeStr = document.getElementById('range-input').value.trim();
        if (!rangeStr) { status.textContent = 'Please enter a page range.'; btn.disabled = false; return; }
        const indices = parseRanges(rangeStr, pageCount);
        if (!indices.length) { status.textContent = 'No valid pages found in range.'; btn.disabled = false; return; }
        const out = await PDFDocument.create();
        const pages = await out.copyPages(src, indices);
        pages.forEach(p => out.addPage(p));
        const bytes = await out.save();
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const dlBtn = document.getElementById('download-btn');
        dlBtn.href = URL.createObjectURL(blob);
        dlBtn.download = 'extracted-pages.pdf';
        dlBtn.style.display = 'block';
        status.textContent = `Done! Extracted ${indices.length} page${indices.length > 1 ? 's' : ''}.`;
      } else {
        const zip = new JSZip();
        for (let i = 0; i < pageCount; i++) {
          const out = await PDFDocument.create();
          const [page] = await out.copyPages(src, [i]);
          out.addPage(page);
          const bytes = await out.save();
          zip.file(`page-${String(i + 1).padStart(3, '0')}.pdf`, bytes);
          status.textContent = `Processing page ${i + 1} of ${pageCount}…`;
        }
        const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/zip' });
        const zipBtn = document.getElementById('download-zip-btn');
        zipBtn.href = URL.createObjectURL(blob);
        zipBtn.download = 'split-pages.zip';
        zipBtn.style.display = 'block';
        status.textContent = `Done! ${pageCount} individual PDF files ready.`;
      }
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    }
    btn.disabled = false;
  }
</script>
<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
