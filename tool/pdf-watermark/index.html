  <style>
    main { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; transform: translateY(-32px); }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 48px 24px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--primary); background: var(--primary-light); }
    .drop-zone svg { margin: 0 auto 12px; display: block; opacity: .4; }
    .drop-zone p { color: var(--text-muted); margin: 0; }
    .drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    .file-info {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
    }
    .file-info .file-name { flex: 1; font-weight: 600; font-size: .9rem; }
    .file-info .page-count { font-size: .85rem; color: var(--text-muted); }
    .remove-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
    .remove-btn:hover { color: #ef4444; }
    label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 8px; }
    input[type="text"], select {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 1rem; font-family: inherit; color: var(--text); background: var(--surface);

    }
    input[type="text"]:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(28,77,141,.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    input[type="range"] { flex: 1; accent-color: var(--primary); }
    .range-value { font-size: .875rem; font-weight: 600; color: var(--primary); min-width: 36px; text-align: right; }
    .color-row { display: flex; align-items: center; gap: 10px; }
    input[type="color"] { width: 42px; height: 42px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; padding: 2px; background: var(--surface); }
    .btn-primary {
      display: block; width: 100%; padding: 14px; margin-top: 20px;
      background: #1C4D8D; color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background .15s, transform .15s;
    }
    .btn-primary:hover { background: #093C5D; transform: translateY(-1px); }

</head>
<body>
<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📄 PDF Tools</div>
  <h1>PDF Watermark</h1>
  <p>Overlay a custom text watermark on every page of your PDF — fully configurable.</p>
</div>
<main>
  <div class="card">
    <p class="card-title">Upload PDF</p>
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4 4 4"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
      <p><strong>Drop PDF here</strong> or click to browse</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    <div id="file-info-area"></div>
  </div>

  <div class="card" id="options-card" style="display:none;">
    <p class="card-title">Watermark Settings</p>
    <label for="wm-text">Watermark Text</label>
    <input type="text" id="wm-text" placeholder="e.g. CONFIDENTIAL" value="CONFIDENTIAL">

    <div class="form-row" style="margin-top:16px;">
      <div class="field">
        <label>Font Size</label>
        <div class="range-row">
          <input type="range" id="font-size" min="12" max="72" step="2" value="48">
          <span class="range-value" id="font-size-label">48</span>
        </div>
      </div>
      <div class="field">
        <label>Opacity</label>
        <div class="range-row">
          <input type="range" id="opacity" min="10" max="80" step="5" value="30">
          <span class="range-value" id="opacity-label">30%</span>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Color</label>
        <div class="color-row">
          <input type="color" id="wm-color" value="#888888">
          <span style="font-size:.875rem;color:var(--text-muted)">Watermark color</span>
        </div>
      </div>
      <div class="field">
        <label for="position">Position</label>
        <select id="position">
          <option value="center">Center (diagonal)</option>
          <option value="topright">Top right</option>
          <option value="bottomleft">Bottom left</option>
        </select>
      </div>
    </div>

    <button class="btn-primary" id="watermark-btn" onclick="addWatermark()">Add Watermark</button>
    <div class="status" id="status"></div>
    <a class="download-btn" id="download-btn" style="display:none;" download="watermarked.pdf">⬇ Download Watermarked PDF</a>
  </div>
</main>
<div id="tool-footer"></div>
<script>
  let pdfFile = null;

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  document.getElementById('font-size').addEventListener('input', function() { document.getElementById('font-size-label').textContent = this.value; });
  document.getElementById('opacity').addEventListener('input', function() { document.getElementById('opacity-label').textContent = this.value + '%'; });

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); fileInput.value = ''; });

  async function loadFile(file) {
    if (!file.name.endsWith('.pdf') && file.type !== 'application/pdf') return;
    pdfFile = file;
    const buf = await file.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(buf);
    const pc = doc.getPageCount();
    document.getElementById('file-info-area').innerHTML = `<div class="file-info"><span class="file-name">${file.name}</span><span class="page-count">${pc} pages &middot; ${(file.size/1024).toFixed(0)} KB</span><button class="remove-btn" onclick="clearFile()">×</button></div>`;
    document.getElementById('options-card').style.display = 'block';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
  }

  function clearFile() {
    pdfFile = null;
    document.getElementById('file-info-area').innerHTML = '';
    document.getElementById('options-card').style.display = 'none';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    return { r, g, b };
  }

  async function addWatermark() {
    if (!pdfFile) return;
    const text = document.getElementById('wm-text').value.trim();
    if (!text) { document.getElementById('status').textContent = 'Please enter watermark text.'; return; }

    const btn = document.getElementById('watermark-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'Adding watermark…';
    document.getElementById('download-btn').style.display = 'none';

    try {
      const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
      const buf = await pdfFile.arrayBuffer();
      const doc = await PDFDocument.load(buf);
      const font = await doc.embedFont(StandardFonts.HelveticaBold);
      const fontSize = parseInt(document.getElementById('font-size').value);
      const opacity = parseInt(document.getElementById('opacity').value) / 100;
      const color = hexToRgb(document.getElementById('wm-color').value);
      const position = document.getElementById('position').value;
      const pages = doc.getPages();

      pages.forEach(page => {
        const { width, height } = page.getSize();
        const textWidth = font.widthOfTextAtSize(text, fontSize);
        const textHeight = font.heightAtSize(fontSize);
        let x, y, rotate;

        if (position === 'center') {
          x = (width - textWidth) / 2;
          y = (height - textHeight) / 2;
          rotate = degrees(45);
        } else if (position === 'topright') {
          x = width - textWidth - 20;
          y = height - textHeight - 20;
          rotate = degrees(0);
        } else {
          x = 20;
          y = 20;
          rotate = degrees(0);
        }

        page.drawText(text, {
          x, y,
          size: fontSize,
          font,
          color: rgb(color.r, color.g, color.b),
          opacity,
          rotate,
        });
      });

      const bytes = await doc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const dlBtn = document.getElementById('download-btn');
      dlBtn.href = URL.createObjectURL(blob);
      dlBtn.style.display = 'block';
      status.textContent = `Done! Watermark added to ${pages.length} page${pages.length > 1 ? 's' : ''}.`;
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    }
    btn.disabled = false;
  }
</script>
<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
