  <!-- qrcode.js from cdnjs - pure JS, no dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="/tool/shared.css">
  <style>
/* Main */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 80px;
      transform: translateY(-32px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Input */
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    textarea, input[type="text"], select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    /* Color picker */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="color"] {
      width: 42px;
      height: 42px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 2px;
      background: var(--surface);
    }

    /* Range */
    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--primary);
    }

    .range-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary);
      min-width: 40px;
      text-align: right;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      width: 100%;
      margin-top: 20px;
    }

    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* QR Output */
    .qr-output {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .qr-output.visible { display: flex; }

    #qr-container {
      padding: 20px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      display: inline-block;
    }

    #qr-container canvas, #qr-container img {
      display: block;
    }

    .download-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state svg { margin: 0 auto 12px; opacity: .3; display: block; }
  </style>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
</head>
<body>

<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📱 Generator</div>
  <h1>QR Code Generator</h1>
  <p>Turn any URL, text, or contact info into a scannable QR code — free and instant.</p>
</div>

<main>
  <!-- Input card -->
  <div class="card">
    <p class="card-title">Content</p>

    <label for="qr-input">Text or URL</label>
    <textarea id="qr-input" placeholder="https://example.com or any text..."></textarea>

    <div class="form-row">
      <div class="field">
        <label for="qr-size">Size</label>
        <div class="range-row">
          <input type="range" id="qr-size" min="128" max="512" step="32" value="256">
          <span class="range-value" id="size-label">256px</span>
        </div>
      </div>
      <div class="field">
        <label for="error-level">Error Correction</label>
        <select id="error-level">
          <option value="L">Low (7%)</option>
          <option value="M" selected>Medium (15%)</option>
          <option value="Q">Quartile (25%)</option>
          <option value="H">High (30%)</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Dark Color</label>
        <div class="color-row">
          <input type="color" id="color-dark" value="#000000">
          <span style="font-size:.875rem;color:var(--text-muted)">Foreground</span>
        </div>
      </div>
      <div class="field">
        <label>Light Color</label>
        <div class="color-row">
          <input type="color" id="color-light" value="#ffffff">
          <span style="font-size:.875rem;color:var(--text-muted)">Background</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateQR()">
      Generate QR Code
    </button>
  </div>

  <!-- Output card -->
  <div class="card" id="output-card">
    <p class="card-title">Your QR Code</p>

    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/>
        <rect x="19" y="14" width="2" height="2"/><rect x="14" y="19" width="2" height="2"/>
        <rect x="19" y="19" width="2" height="2"/>
      </svg>
      <p>Enter content above and click <strong>Generate</strong> to create your QR code.</p>
    </div>

    <div class="qr-output" id="qr-output">
      <div id="qr-container"></div>
      <div class="download-row">
        <button class="btn btn-primary" onclick="downloadQR()" style="width:auto;">
          ⬇ Download PNG
        </button>
        <button class="btn btn-outline" onclick="copyQR()">
          Copy Image
        </button>
      </div>
    </div>
  </div>
</main>

<div id="tool-footer"></div>
<script>
  const sizeInput = document.getElementById('qr-size');
  const sizeLabel = document.getElementById('size-label');

  sizeInput.addEventListener('input', () => {
    sizeLabel.textContent = sizeInput.value + 'px';
  });

  let qrInstance = null;

  function generateQR() {
    if (typeof QRCode === 'undefined') {
      alert('QR library failed to load. Please check your internet connection and refresh the page.');
      return;
    }

    const text = document.getElementById('qr-input').value.trim();
    if (!text) {
      alert('Please enter some text or URL first.');
      return;
    }

    const size = parseInt(sizeInput.value);
    const level = document.getElementById('error-level').value;
    const dark = document.getElementById('color-dark').value;
    const light = document.getElementById('color-light').value;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';

    try {
      qrInstance = new QRCode(container, {
        text,
        width: size,
        height: size,
        colorDark: dark,
        colorLight: light,
        correctLevel: QRCode.CorrectLevel[level]
      });
    } catch (err) {
      container.innerHTML = '';
      alert('Failed to generate QR code: ' + err.message);
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('qr-output').classList.add('visible');
  }

  function getCanvas() {
    return document.querySelector('#qr-container canvas');
  }

  function downloadQR() {
    const canvas = getCanvas();
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = 'qr-code.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  async function copyQR() {
    const canvas = getCanvas();
    if (!canvas) return;
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        alert('QR code copied to clipboard!');
      } catch {
        alert('Copy not supported in this browser. Use Download instead.');
      }
    });
  }

  // Generate on Enter key in textarea
  document.getElementById('qr-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) generateQR();
  });
</script>

<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
