  <style>
    .hero { background: var(--hero-gradient); color:#fff; padding: 48px 24px 56px; text-align:center; }
    .tool-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:4px 14px; font-size:.8rem; font-weight:600; margin-bottom:16px; }
    .hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight:800; letter-spacing:-.5px; margin-bottom:12px; }
    .hero p { color: rgba(255,255,255,.75); font-size:1.05rem; max-width:480px; margin:0 auto; }
    main { max-width: 900px; margin:0 auto; padding: 0 24px 80px; transform: translateY(-32px); }
    .card { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); margin-bottom:20px; }
    .card-title { font-size:.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color: var(--text-muted); margin-bottom:14px; }
    .controls { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom:18px; }
    @media(max-width:560px){ .controls { grid-template-columns: 1fr; } }
    label { display:block; font-size:.8rem; font-weight:600; color: var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
    select, input[type=number] { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; font-family:inherit; background: var(--surface); color: var(--text); outline:none; transition: border-color .15s; }
    select:focus, input[type=number]:focus { border-color: var(--primary); }
    .opts { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:16px; }
    .opt-check { display:flex; align-items:center; gap:8px; font-size:.9rem; color: var(--text); cursor:pointer; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .btn-primary { padding:10px 20px; background: var(--primary); color:#fff; border:none; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit; transition: background .15s; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost { padding:10px 16px; background:transparent; color: var(--text-muted); border:1px solid var(--border); border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit; transition: all .15s; }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .out-wrap { position:relative; }
    textarea { width:100%; min-height:280px; padding:14px; border:1.5px solid var(--border); border-radius:10px; font-size:1rem; font-family:inherit; color: var(--text); background: var(--surface); resize:vertical; line-height:1.7; outline:none; }
    textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(28,77,141,.15); }
    .copy-btn { position:absolute; top:10px; right:10px; padding:6px 12px; background: var(--surface); border:1px solid var(--border); border-radius:6px; font-size:.8rem; font-weight:600; cursor:pointer; color: var(--text-muted); font-family:inherit; transition: all .15s; }
    .copy-btn:hover { border-color: var(--primary); color: var(--primary); }
  </style>
  <script>
    (function(){var s=localStorage.getItem('theme');var p=window.matchMedia('(prefers-color-scheme: dark)').matches;var t=s||(p?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
  </script>

<body>

<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📝 Writing</div>
  <h1>Lorem Ipsum Generator</h1>
  <p>Generate placeholder text by paragraphs, sentences, words, or characters.</p>
</div>

<main>

  <div class="card">
    <p class="card-title">Options</p>

    <div class="controls">
      <div>
        <label for="unit">Unit</label>
        <select id="unit">
          <option value="paragraphs">Paragraphs</option>
          <option value="sentences">Sentences</option>
          <option value="words">Words</option>
          <option value="characters">Characters</option>
        </select>
      </div>
      <div>
        <label for="count">Count</label>
        <input type="number" id="count" value="5" min="1" max="500">
      </div>
    </div>

    <div class="opts">
      <label class="opt-check"><input type="checkbox" id="startLorem" checked> Start with "Lorem ipsum"</label>
      <label class="opt-check"><input type="checkbox" id="asHtml"> Wrap in &lt;p&gt; tags</label>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="generate()">⚡ Generate</button>
      <button class="btn-ghost" onclick="clearOut()">🗑 Clear</button>
    </div>

    <div class="out-wrap">
      <textarea id="output" placeholder="Click Generate to create text…"></textarea>
      <button class="copy-btn" onclick="copyOut(this)">Copy</button>
    </div>
  </div>

</main>

<div id="tool-footer"></div>

<script>
  const WORDS = ('lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum at vero eos accusamus iusto odio dignissimos ducimus blanditiis praesentium voluptatum deleniti atque corrupti quos quas molestias excepturi obcaecati cupiditate provident similique mollitia animi laborum dolorum fuga harum quidem rerum facilis expedita distinctio nam libero tempore cum soluta nobis eligendi optio cumque impedit minus quod maxime placeat facere possimus omnis assumenda repellendus temporibus autem quibusdam officiis debitis aut rerum necessitatibus saepe eveniet voluptates repudiandae recusandae itaque earum hic tenetur sapiente delectus reiciendis maiores doloribus asperiores').split(' ');

  const out = document.getElementById('output');
  const unitSel = document.getElementById('unit');
  const countInp = document.getElementById('count');

  function rint(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(){ return WORDS[rint(0, WORDS.length-1)]; }

  function makeSentence(){
    const len = rint(6, 14);
    const w = [];
    for (let i=0;i<len;i++) w.push(pick());
    let s = w.join(' ');
    if (Math.random()<0.4) {
      const c = rint(2, len-2);
      w[c] = w[c]+',';
      s = w.join(' ');
    }
    return s.charAt(0).toUpperCase()+s.slice(1)+'.';
  }

  function makeParagraph(){
    const n = rint(4, 7);
    const arr = [];
    for (let i=0;i<n;i++) arr.push(makeSentence());
    return arr.join(' ');
  }

  function generate(){
    const unit = unitSel.value;
    let n = parseInt(countInp.value, 10);
    if (!n || n < 1) n = 1; if (n > 500) n = 500;
    const startLorem = document.getElementById('startLorem').checked;
    const asHtml = document.getElementById('asHtml').checked;

    let text = '';

    if (unit === 'paragraphs') {
      const arr = [];
      for (let i=0;i<n;i++) arr.push(makeParagraph());
      if (startLorem && arr.length) {
        arr[0] = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. ' + arr[0];
      }
      text = asHtml ? arr.map(p => '<p>'+p+'</p>').join('\n') : arr.join('\n\n');
    }
    else if (unit === 'sentences') {
      const arr = [];
      for (let i=0;i<n;i++) arr.push(makeSentence());
      if (startLorem && arr.length) {
        arr[0] = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.';
      }
      text = arr.join(' ');
    }
    else if (unit === 'words') {
      const arr = [];
      for (let i=0;i<n;i++) arr.push(pick());
      if (startLorem) {
        const seed = ['Lorem','ipsum','dolor','sit','amet'];
        for (let i=0;i<Math.min(seed.length, n); i++) arr[i] = seed[i];
      }
      text = arr.join(' ');
      text = text.charAt(0).toUpperCase()+text.slice(1);
    }
    else { // characters
      let s = '';
      while (s.length < n) s += (s ? ' ' : '') + pick();
      s = s.slice(0, n);
      if (startLorem) {
        const head = 'Lorem ipsum dolor sit amet';
        s = head.slice(0, n) + s.slice(head.length);
        s = s.slice(0, n);
      }
      text = s.charAt(0).toUpperCase()+s.slice(1);
    }

    out.value = text;
  }

  function clearOut(){ out.value=''; }

  async function copyOut(btn){
    const v = out.value; if(!v) return;
    try { await navigator.clipboard.writeText(v); }
    catch { out.select(); document.execCommand('copy'); }
    const o = btn.textContent; btn.textContent='✅ Copied'; setTimeout(()=>btn.textContent=o, 1500);
  }

  generate();
</script>

<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header'); if(el) el.outerHTML = html;
    const t = document.getElementById('navTitle'); if(t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if(btn){
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function(){
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light':'dark');
        localStorage.setItem('theme', isDark ? 'light':'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer'); if(el) el.outerHTML = html;
  });
</script>

</body>
</html>
