  <style>
nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);

    .hero {
      background: var(--hero-gradient);

    }

    .tool-badge {
      display: inline-flex;

    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;

      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;

    }

    .stat-val {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--primary);

      margin-bottom: 4px;
    }

    .stat-name {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;

    /* Time estimates */
    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;

      .time-row { grid-template-columns: 1fr; }

      background: var(--primary-light);

      display: flex;
      align-items: center;
      gap: 12px;
    }

    .time-icon { font-size: 1.4rem; }

    .time-label {
      font-size: 0.8rem;
      color: var(--primary-dark);
      font-weight: 600;
    }

    .time-val {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--primary-dark);
    }

    /* Textarea */
    .textarea-wrap { position: relative; }

    #main-text {
      width: 100%;
      min-height: 280px;
      padding: 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;

      font-family: inherit;

      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);

    #main-text::placeholder { color: var(--text-muted); }

    .textarea-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;

      transition: all .15s;

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    /* Keyword density */
    .keyword-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .keyword-table th {

      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .keyword-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .keyword-table tr:last-child td { border-bottom: none; }

    .kw-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; min-width: 60px; }
    .kw-bar { height: 6px; background: var(--primary); border-radius: 3px; transition: width .3s; }

    .kw-row { display: flex; align-items: center; gap: 8px; }

    .empty-keywords {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 20px;
    }
  </style>
<script>
  (function() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
</head>
<body>

<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📝 Writing</div>
  <h1>Word Counter</h1>
  <p>Paste or type your text to instantly count words, characters, sentences, and more.</p>
</div>

<main>

  <!-- Stats card -->
  <div class="card">
    <p class="card-title">Stats</p>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="stat-words">0</div>
        <div class="stat-name">Words</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-chars">0</div>
        <div class="stat-name">Characters</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-chars-no-space">0</div>
        <div class="stat-name">No Spaces</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-sentences">0</div>
        <div class="stat-name">Sentences</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-paragraphs">0</div>
        <div class="stat-name">Paragraphs</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-lines">0</div>
        <div class="stat-name">Lines</div>
      </div>
    </div>

    <div class="time-row">
      <div class="time-box">
        <div class="time-icon">👁</div>
        <div>
          <div class="time-label">Reading time</div>
          <div class="time-val" id="reading-time">0 sec</div>
        </div>
      </div>
      <div class="time-box">
        <div class="time-icon">🎤</div>
        <div>
          <div class="time-label">Speaking time</div>
          <div class="time-val" id="speaking-time">0 sec</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Editor card -->
  <div class="card">
    <p class="card-title">Your Text</p>
    <div class="textarea-wrap">
      <textarea id="main-text" placeholder="Start typing or paste your text here…" autofocus></textarea>
    </div>
    <div class="textarea-actions">
      <button class="btn btn-ghost" onclick="pasteText()">📋 Paste</button>
      <button class="btn btn-ghost" onclick="clearText()">🗑 Clear</button>
    </div>
  </div>

  <!-- Keywords card -->
  <div class="card">
    <p class="card-title">Top Keywords</p>
    <div id="keywords-container">
      <p class="empty-keywords">Start typing to see keyword density.</p>
    </div>
  </div>

</main>

<div id="tool-footer"></div>
<script>
  const textarea = document.getElementById('main-text');

  const STOP_WORDS = new Set([
    'a','an','the','and','or','but','in','on','at','to','for','of','with',
    'is','are','was','were','be','been','being','have','has','had','do','does',
    'did','will','would','could','should','may','might','shall','can','i','you',
    'he','she','it','we','they','me','him','her','us','them','my','your','his',
    'its','our','their','this','that','these','those','from','by','about','as',
    'into','through','during','before','after','above','below','up','down','out',
    'off','over','under','then','once','not','no','so','if','also','just','more'
  ]);

  function countWords(text) {
    return text.trim() === '' ? 0 : text.trim().split(/\s+/).filter(w => w.length > 0).length;
  }

  function countSentences(text) {
    if (!text.trim()) return 0;
    const matches = text.match(/[^.!?]*[.!?]+/g);
    return matches ? matches.length : (text.trim() ? 1 : 0);
  }

  function countParagraphs(text) {
    if (!text.trim()) return 0;
    return text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
  }

  function formatTime(seconds) {
    if (seconds < 60) return Math.ceil(seconds) + ' sec';
    const m = Math.floor(seconds / 60);
    const s = Math.round(seconds % 60);
    return s > 0 ? `${m} min ${s} sec` : `${m} min`;
  }

  function getKeywords(text) {
    if (!text.trim()) return [];
    const words = text.toLowerCase().match(/\b[a-z']{3,}\b/g) || [];
    const freq = {};
    words.forEach(w => {
      if (!STOP_WORDS.has(w)) freq[w] = (freq[w] || 0) + 1;
    });
    return Object.entries(freq)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 10);
  }

  function update() {
    const text = textarea.value;

    const words = countWords(text);
    const chars = text.length;
    const charsNoSpace = text.replace(/\s/g, '').length;
    const sentences = countSentences(text);
    const paragraphs = countParagraphs(text);
    const lines = text === '' ? 0 : text.split('\n').length;

    document.getElementById('stat-words').textContent = words.toLocaleString();
    document.getElementById('stat-chars').textContent = chars.toLocaleString();
    document.getElementById('stat-chars-no-space').textContent = charsNoSpace.toLocaleString();
    document.getElementById('stat-sentences').textContent = sentences.toLocaleString();
    document.getElementById('stat-paragraphs').textContent = paragraphs.toLocaleString();
    document.getElementById('stat-lines').textContent = lines.toLocaleString();

    // Reading ~238 wpm, speaking ~150 wpm
    const readSec = (words / 238) * 60;
    const speakSec = (words / 150) * 60;
    document.getElementById('reading-time').textContent = words > 0 ? formatTime(readSec) : '0 sec';
    document.getElementById('speaking-time').textContent = words > 0 ? formatTime(speakSec) : '0 sec';

    // Keywords
    const keywords = getKeywords(text);
    const container = document.getElementById('keywords-container');

    if (keywords.length === 0) {
      container.innerHTML = '<p class="empty-keywords">Start typing to see keyword density.</p>';
      return;
    }

    const maxCount = keywords[0][1];
    container.innerHTML = `
      <table class="keyword-table">
        <thead>
          <tr>
            <th>Keyword</th>
            <th>Count</th>
            <th>Density</th>
            <th style="width:40%"></th>
          </tr>
        </thead>
        <tbody>
          ${keywords.map(([word, count]) => {
            const density = words > 0 ? ((count / words) * 100).toFixed(1) : 0;
            const pct = Math.round((count / maxCount) * 100);
            return `
              <tr>
                <td><strong>${word}</strong></td>
                <td>${count}</td>
                <td>${density}%</td>
                <td>
                  <div class="kw-row">
                    <div class="kw-bar-wrap">
                      <div class="kw-bar" style="width:${pct}%"></div>
                    </div>
                  </div>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  textarea.addEventListener('input', update);

  async function pasteText() {
    try {
      const text = await navigator.clipboard.readText();
      textarea.value = text;
      update();
      textarea.focus();
    } catch {
      alert('Could not access clipboard. Please paste manually with Ctrl+V.');
    }
  }

  function clearText() {
    if (textarea.value && !confirm('Clear all text?')) return;
    textarea.value = '';
    update();
    textarea.focus();
  }

  // Initial count
  update();
</script>

<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
