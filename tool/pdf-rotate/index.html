<body>
<div id="tool-header"></div>
<div class="hero">
  <div class="tool-badge">📄 PDF Tools</div>
  <h1>PDF Rotate</h1>
  <p>Rotate any page in your PDF by 90°, 180°, or 270° — per page or all at once.</p>
</div>
<main>
  <div class="card">
    <p class="card-title">Upload PDF</p>
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4 4 4"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
      <p><strong>Drop PDF here</strong> or click to browse</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    <div id="file-info-area"></div>
    <div id="rotate-area" style="display:none;">
      <div class="bulk-bar">
        <span class="bulk-label">All pages:</span>
        <button class="rot-btn" onclick="rotateAll(-90)">↺ 90° Left</button>
        <button class="rot-btn" onclick="rotateAll(90)">↻ 90° Right</button>
        <button class="rot-btn" onclick="rotateAll(180)">↕ 180°</button>
        <button class="rot-btn" onclick="rotateAll(0)">↺ Reset</button>
      </div>
      <div class="page-list" id="page-list"></div>
      <button class="btn-primary" id="apply-btn" onclick="applyRotations()">Apply Rotations</button>
    </div>
    <div class="status" id="status"></div>
    <a class="download-btn" id="download-btn" style="display:none;" download="rotated.pdf">⬇ Download Rotated PDF</a>
  </div>
</main>
<div id="tool-footer"></div>
<script>
  let pdfFile = null;
  let pageCount = 0;
  let rotations = [];

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); fileInput.value = ''; });

  async function loadFile(file) {
    if (!file.name.endsWith('.pdf') && file.type !== 'application/pdf') return;
    pdfFile = file;
    const buf = await file.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(buf);
    pageCount = doc.getPageCount();
    rotations = new Array(pageCount).fill(0);
    document.getElementById('file-info-area').innerHTML = `<div class="file-info"><span class="file-name">${file.name}</span><span class="page-count">${pageCount} pages &middot; ${(file.size/1024).toFixed(0)} KB</span><button class="remove-btn" onclick="clearFile()">×</button></div>`;
    document.getElementById('rotate-area').style.display = 'block';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
    renderPageList();
  }

  function clearFile() {
    pdfFile = null; pageCount = 0; rotations = [];
    document.getElementById('file-info-area').innerHTML = '';
    document.getElementById('rotate-area').style.display = 'none';
    document.getElementById('download-btn').style.display = 'none';
    document.getElementById('status').textContent = '';
  }

  function normalizeAngle(a) { return ((a % 360) + 360) % 360; }

  function renderPageList() {
    const list = document.getElementById('page-list');
    list.innerHTML = '';
    for (let i = 0; i < pageCount; i++) {
      const row = document.createElement('div');
      row.className = 'page-row';
      row.id = `page-row-${i}`;
      row.innerHTML = `<span class="page-num">Page ${i + 1}</span><span class="rot-indicator" id="rot-label-${i}">${rotations[i] === 0 ? 'No rotation' : rotations[i] + '°'}</span><button class="page-rot-btn" onclick="rotatePage(${i}, -90)">↺ 90°</button><button class="page-rot-btn" onclick="rotatePage(${i}, 90)">↻ 90°</button><button class="page-rot-btn" onclick="rotatePage(${i}, 180)">↕ 180°</button>`;
      list.appendChild(row);
    }
  }

  function rotatePage(i, delta) {
    rotations[i] = normalizeAngle(rotations[i] + delta);
    document.getElementById(`rot-label-${i}`).textContent = rotations[i] === 0 ? 'No rotation' : rotations[i] + '°';
    document.getElementById('download-btn').style.display = 'none';
  }

  function rotateAll(delta) {
    for (let i = 0; i < pageCount; i++) {
      rotations[i] = delta === 0 ? 0 : normalizeAngle(rotations[i] + delta);
      const lbl = document.getElementById(`rot-label-${i}`);
      if (lbl) lbl.textContent = rotations[i] === 0 ? 'No rotation' : rotations[i] + '°';
    }
    document.getElementById('download-btn').style.display = 'none';
  }

  async function applyRotations() {
    if (!pdfFile) return;
    const btn = document.getElementById('apply-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'Applying rotations…';
    document.getElementById('download-btn').style.display = 'none';

    try {
      const { PDFDocument, degrees } = PDFLib;
      const buf = await pdfFile.arrayBuffer();
      const doc = await PDFDocument.load(buf);
      const pages = doc.getPages();
      pages.forEach((page, i) => {
        const existing = page.getRotation().angle;
        page.setRotation(degrees(normalizeAngle(existing + rotations[i])));
      });
      const bytes = await doc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const dlBtn = document.getElementById('download-btn');
      dlBtn.href = URL.createObjectURL(blob);
      dlBtn.style.display = 'block';
      status.textContent = 'Done! Rotations applied.';
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    }
    btn.disabled = false;
  }
</script>
<script>
  fetch('/tool/header.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-header');
    if (el) { el.outerHTML = html; }
    const t = document.getElementById('navTitle');
    if (t) t.textContent = document.title.split(' - ')[0].replace('Free ','');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme')==='dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '🌙' : '☀️';
      });
    }
  });
  fetch('/tool/footer.html').then(r=>r.text()).then(html=>{
    const el = document.getElementById('tool-footer');
    if (el) el.outerHTML = html;
  });
</script>
</body>
</html>
