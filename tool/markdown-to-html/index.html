<script>
  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function mdToHtml(md) {
    let html = md;
    // Fenced code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code${lang ? ` class="language-${lang}"`:''}>` + escHtml(code.trim()) + '</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    // Headers
    html = html.replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>');
    // Blockquotes
    html = html.replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>');
    // HR
    html = html.replace(/^[-*_]{3,}\s*$/gm, '<hr>');
    // Bold + italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/_(.+?)_/g, '<em>$1</em>');
    html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
    // Images (before links)
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Tables
    html = html.replace(/^\|(.+)\|\s*\n\|[-| :]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm, (_, head, body) => {
      const th = head.split('|').map(c => `<th>${c.trim()}</th>`).join('');
      const rows = body.trim().split('\n').map(row => {
        const tds = row.replace(/^\||\|$/g,'').split('|').map(c => `<td>${c.trim()}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
    });
    // Unordered lists
    html = html.replace(/(^[-*+]\s+.+(\n|$))+/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[-*+]\s+/,'')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    // Ordered lists
    html = html.replace(/(^\d+\.\s+.+(\n|$))+/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s+/,'')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    // Paragraphs
    html = html.replace(/^(?!<[a-z]|\s*$)(.+)$/gm, '<p>$1</p>');
    // Cleanup
    html = html.replace(/\n{3,}/g, '\n\n');
    return html.trim();
  }

  function render() {
    const md = document.getElementById('md-input').value;
    const html = mdToHtml(md);
    document.getElementById('preview').innerHTML = html;
    document.getElementById('raw-html').textContent = html;
  }

  function showTab(tab) {
    document.getElementById('preview').style.display = tab === 'preview' ? '' : 'none';
    document.getElementById('raw-html').style.display = tab === 'raw' ? 'block' : 'none';
    document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
    document.getElementById('tab-raw').classList.toggle('active', tab === 'raw');
  }

  async function clip(text) {
    try { await navigator.clipboard.writeText(text); return true; } catch {}
    try {
      const ta = Object.assign(document.createElement('textarea'), {value: text});
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta); return ok;
    } catch { return false; }
  }

  async function copyHtml(btn) {
    const html = mdToHtml(document.getElementById('md-input').value);
    const ok = await clip(html);
    if (ok) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy HTML', 1500); }
  }

  function clearAll() {
    document.getElementById('md-input').value = '';
    document.getElementById('preview').innerHTML = '';
    document.getElementById('raw-html').textContent = '';
  }

  function insertSample() {
    document.getElementById('md-input').value = `# Markdown to HTML

\`\`\`javascript

  return \`Hello, \${name}!\`;
}
\`\`\`

## Blockquote

> This is a blockquote. Great for callouts and citations.

## Table

| Name   | Role     | Score |
|--------|----------|-------|
| Alice  | Dev      | 98    |
| Bob    | Design   | 95    |

## Link & Image

[Visit Oursolve](https://oursolve.com)
`;
    render();
  }

  // Initial render
  insertSample();
</script>
