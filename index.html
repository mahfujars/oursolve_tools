<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Free Online Tools - Oursolve.com</title>
  <meta name="description" content="Oursolve is a free collection of online tools for everyday tasks. QR code generator, password generator, word counter — all free, no sign-up, 100% in your browser.">
  <meta name="keywords" content="free online tools, qr code generator, password generator, word counter, free web tools">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://oursolve.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://oursolve.com/">
  <meta property="og:title" content="Free Online Tools - Oursolve.com">
  <meta property="og:description" content="Free collection of online tools for everyday tasks. QR code generator, password generator, word counter — no sign-up, 100% in your browser.">
  <meta property="og:site_name" content="Oursolve">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:url" content="https://oursolve.com/">
  <meta name="twitter:title" content="Free Online Tools - Oursolve.com">
  <meta name="twitter:description" content="Free collection of online tools for everyday tasks. No sign-up. 100% in your browser.">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Oursolve",
    "url": "https://oursolve.com/",
    "description": "Free collection of online tools for everyday tasks.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://oursolve.com/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 12px rgba(99,102,241,.2), 0 8px 32px rgba(0,0,0,.1);
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      color: #fff;
      padding: 64px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(139,92,246,.3) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, rgba(99,102,241,.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
      position: relative;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative;
    }

    header p {
      font-size: 1.15rem;
      color: rgba(255,255,255,.75);
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    /* Main */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
      transform: translateY(-40px);
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* Tool grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary);
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .tool-card h2 {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .tool-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
    }

    .tool-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
    }

    .tool-link svg {
      transition: transform .2s;
    }

    .tool-card:hover .tool-link svg {
      transform: translateX(4px);
    }

    /* Tag */
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Colors per tool */
    .icon-qr   { background: #ede9fe; }
    .icon-pass { background: #fce7f3; }
    .icon-word { background: #d1fae5; }
    .icon-json { background: #fff7ed; }
    .icon-b64  { background: #eff6ff; }
    .icon-url  { background: #f0fdf4; }
    .icon-hash { background: #fdf2f8; }
    .icon-md   { background: #f5f3ff; }
    .icon-rx   { background: #ecfeff; }
    .icon-islamic { background: #fef9c3; }
    .icon-soon { background: #f1f5f9; }

    /* Search + filter bar */
    .toolbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }

    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      font-size: 0.95rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .chip .count {
      opacity: 0.7;
      margin-left: 4px;
      font-weight: 500;
    }

    /* Category section */
    .category-section {
      margin-bottom: 36px;
    }

    .category-section:last-child {
      margin-bottom: 0;
    }

    .category-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .category-heading h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .category-heading .count-badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--border);
      padding: 2px 10px;
      border-radius: 50px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state strong {
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛠</div>
    Oursolve
  </div>
  <h1>Free Tools for Everyday Tasks</h1>
  <p>Simple, fast, and private — all tools run entirely in your browser. No sign-up. No tracking.</p>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/>
        <path d="m20 20-3.5-3.5"/>
      </svg>
      <input id="searchInput" class="search-input" type="search" placeholder="Search tools..." autocomplete="off">
    </div>
    <div id="filterChips" class="filter-chips"></div>
  </div>

  <div id="toolsContainer"></div>

  <p class="section-title" style="margin-top:48px">From the Blog</p>
  <div id="blogPosts" class="tools-grid"></div>
  <div id="blogFooter" style="margin-top:20px;text-align:center">
    <a href="/blog/" style="display:inline-flex;align-items:center;gap:6px;font-size:.875rem;font-weight:600;color:var(--primary);text-decoration:none;padding:10px 22px;border:1px solid var(--primary-light);border-radius:50px;background:var(--primary-light);transition:all .15s"
       onmouseover="this.style.background='var(--primary)';this.style.color='#fff'"
       onmouseout="this.style.background='var(--primary-light)';this.style.color='var(--primary)'">
      View all articles
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>
</main>

<footer>
  <p>Built with ♥ by <a href="/">Oursolve</a> · <a href="/blog/">Blog</a> · All tools are free and run 100% in your browser.</p>
</footer>

<script>
  /* Tool registry — add new tools here. Order within category preserved. */
  const TOOLS = [
    { slug: 'qr-generator',      name: 'QR Code Generator',      category: 'Generator', icon: '📱', iconClass: 'icon-qr',   desc: 'Convert any URL, text, or contact info into a scannable QR code. Download as PNG instantly.' },
    { slug: 'password-generator', name: 'Password Generator',     category: 'Security',  icon: '🔑', iconClass: 'icon-pass', desc: 'Generate strong, random passwords with custom length and character sets. Strength meter included.' },
    { slug: 'word-counter',      name: 'Word Counter',           category: 'Writing',   icon: '📝', iconClass: 'icon-word', desc: 'Count words, characters, sentences, and paragraphs. Estimates reading time and speaking time.' },
    { slug: 'json-formatter',    name: 'JSON Formatter',         category: 'Developer', icon: '🧰', iconClass: 'icon-json', desc: 'Format, minify and validate JSON instantly. Syntax highlighted output with auto-format on paste.' },
    { slug: 'base64',            name: 'Base64 Encoder / Decoder', category: 'Encoding', icon: '🔤', iconClass: 'icon-b64', desc: 'Encode text or files to Base64 or decode Base64 strings back to plain text. File drag & drop supported.' },
    { slug: 'url-encoder',       name: 'URL Encoder / Decoder',  category: 'Developer', icon: '🔗', iconClass: 'icon-url',  desc: 'Percent-encode URL strings or decode encoded URLs. Supports encodeURIComponent and encodeURI modes.' },
    { slug: 'hash-generator',    name: 'Hash Generator',         category: 'Security',  icon: '🔐', iconClass: 'icon-hash', desc: 'Generate SHA-1, SHA-256, SHA-384, and SHA-512 hashes from text or files using native browser crypto.' },
    { slug: 'markdown-to-html',  name: 'Markdown to HTML',       category: 'Writing',   icon: '📄', iconClass: 'icon-md',   desc: 'Convert Markdown to HTML with a live side-by-side preview. Supports tables, code blocks, and more.' },
    { slug: 'regex-tester',      name: 'Regex Tester',           category: 'Developer', icon: '⚡', iconClass: 'icon-rx',   desc: 'Test regular expressions in real-time. Match highlighting, capture group details, and all JS flags supported.' },
    { slug: 'muslim-names',      name: 'Muslim Baby Names',      category: 'Islamic',   icon: '☪️', iconClass: 'icon-islamic', desc: 'Browse 200+ Islamic names for boys and girls with Arabic script, meanings, and origins.' },
  ];

  /* Category display order */
  const CATEGORY_ORDER = ['Developer', 'Security', 'Generator', 'Encoding', 'Writing', 'Islamic'];

  const ARROW_SVG = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  let activeFilter = 'All';
  let searchTerm = '';

  function cardHTML(t) {
    return `
      <a class="tool-card" href="tools/${t.slug}/">
        <div class="tool-icon ${t.iconClass}">${t.icon}</div>
        <div>
          <span class="tag">${t.category}</span>
          <h2>${t.name}</h2>
        </div>
        <p>${t.desc}</p>
        <span class="tool-link">Open tool ${ARROW_SVG}</span>
      </a>`;
  }

  function renderChips() {
    const counts = TOOLS.reduce((acc, t) => (acc[t.category] = (acc[t.category] || 0) + 1, acc), {});
    const cats = ['All', ...CATEGORY_ORDER.filter(c => counts[c])];
    const html = cats.map(c => {
      const n = c === 'All' ? TOOLS.length : counts[c];
      const cls = c === activeFilter ? 'chip active' : 'chip';
      return `<button class="${cls}" data-cat="${c}">${c}<span class="count">${n}</span></button>`;
    }).join('');
    document.getElementById('filterChips').innerHTML = html;
    document.querySelectorAll('#filterChips .chip').forEach(b => {
      b.addEventListener('click', () => { activeFilter = b.dataset.cat; renderChips(); renderTools(); });
    });
  }

  function renderTools() {
    const q = searchTerm.trim().toLowerCase();
    const filtered = TOOLS.filter(t => {
      if (activeFilter !== 'All' && t.category !== activeFilter) return false;
      if (q && !(t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.category.toLowerCase().includes(q))) return false;
      return true;
    });

    const container = document.getElementById('toolsContainer');
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><strong>No tools match your search.</strong>Try a different keyword or category.</div>`;
      return;
    }

    /* Search active OR specific category: flat grid. Otherwise group by category. */
    if (q || activeFilter !== 'All') {
      container.innerHTML = `<div class="tools-grid">${filtered.map(cardHTML).join('')}</div>`;
      return;
    }

    const groups = {};
    filtered.forEach(t => { (groups[t.category] = groups[t.category] || []).push(t); });
    const sections = CATEGORY_ORDER.filter(c => groups[c]).map(c => `
      <section class="category-section">
        <div class="category-heading">
          <h3>${c}</h3>
          <span class="count-badge">${groups[c].length}</span>
        </div>
        <div class="tools-grid">${groups[c].map(cardHTML).join('')}</div>
      </section>`).join('');
    container.innerHTML = sections;
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderTools();
  });

  renderChips();
  renderTools();

  async function loadBlogPosts() {
    try {
      const res = await fetch('/wp-json/wp/v2/posts?per_page=3&_embed=1');
      if (!res.ok) return;
      const posts = await res.json();
      if (!posts.length) { document.getElementById('blogPosts').closest('div').style.display='none'; return; }
      document.getElementById('blogPosts').innerHTML = posts.map(p => {
        const date = p.date ? new Date(p.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        const cats = p._embedded?.['wp:term']?.[0] || [];
        const badge = cats.length ? `<span class="tag">${cats[0].name}</span>` : '';
        const excerpt = (p.excerpt?.rendered || '').replace(/<[^>]+>/g,'').replace(/&#8230;|…/g,'…').trim();
        return `
          <a class="tool-card" href="${p.link}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              ${badge}
              <span style="font-size:.75rem;color:var(--text-muted);flex-shrink:0">${date}</span>
            </div>
            <h2>${p.title.rendered}</h2>
            <p>${excerpt}</p>
            <span class="tool-link">Read article
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </span>
          </a>
        `;
      }).join('');
    } catch { /* hide section if API unavailable */ }
  }
  loadBlogPosts();
</script>

</body>
</html>
